<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Activo</title>

    <!-- Bootswatch Lux -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/lux/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div class="card-header">
              <h3 class="mb-0">Registro de Activo</h3>
            </div>

            <div class="card-body">
              <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                  <label for="id_nombre" class="form-label">
                    Nombre del Activo
                  </label>
                  {{ form.nombre }}
                </div>

                <div class="mb-3">
                  <label for="id_descripcion" class="form-label">
                    Descripción
                  </label>
                  {{ form.descripcion }}
                </div>

                <div class="mb-3">
                  <label for="id_tipo" class="form-label">
                    Tipo de Activo
                  </label>
                  {{ form.tipo }}
                </div>

                <hr />

                <h5 class="mb-3">Valoración CIA</h5>

                <div class="row">
                  <div class="col-md-4 mb-3">
                    <label for="id_confidencialidad" class="form-label">
                      Confidencialidad
                    </label>
                    {{ form.confidencialidad }}
                  </div>

                  <div class="col-md-4 mb-3">
                    <label for="id_integridad" class="form-label">
                      Integridad
                    </label>
                    {{ form.integridad }}
                  </div>

                  <div class="col-md-4 mb-3">
                    <label for="id_disponibilidad" class="form-label">
                      Disponibilidad
                    </label>
                    {{ form.disponibilidad }}
                  </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                  <button type="submit" class="btn btn-primary">
                    Guardar Activo
                  </button>

                  <button type="reset" class="btn btn-secondary">
                    Limpiar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
